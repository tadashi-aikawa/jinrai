name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    # Package.swift が swift-tools-version 6.0 を要求するため、
    # Swift 6 (Xcode 16) を積む macos-15 以上が必要
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: swift build
      - name: Test
        run: swift test
      - name: Build app bundle
        run: ./scripts/make-app.sh release

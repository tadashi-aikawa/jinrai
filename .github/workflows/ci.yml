name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    # ローカルの開発環境(最新 macOS)と SDK 世代を揃える。
    # 古い SDK は ScreenCaptureKit 等の Sendable 注釈が欠けておりビルドが落ちる
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6
      - name: Build
        run: swift build
      - name: Test
        run: swift test
      - name: Build app bundle
        run: ./scripts/make-app.sh release

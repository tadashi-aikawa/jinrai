name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    # ci.yml と同じ理由(古い SDK は ScreenCaptureKit の Sendable 注釈が欠ける)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6

      # 自己署名証明書 jinrai-dev を一時 keychain に import する。
      # ad-hoc 署名だとリリース毎に署名が変わり、TCC(アクセシビリティ・画面収録)の
      # 許可がアップデートのたびに剥がれるため、署名を固定する。
      - name: Import signing certificate
        env:
          P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD=$(openssl rand -base64 24)
          echo "$P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" \
            -P "$P12_PASSWORD" -T /usr/bin/codesign
          # codesign が非対話で秘密鍵にアクセスできるようにする(無いとハングする)
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          # make-app.sh の find-identity が見つけられるよう search list に追加
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db
          rm "$RUNNER_TEMP/cert.p12"

      - name: Extract version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Build app bundle
        run: ./scripts/make-app.sh release "$VERSION"

      # ad-hoc フォールバックのままリリースする事故を防ぐ
      - name: Verify signature
        run: |
          codesign -dvv .build/JINRAI.app 2>&1 | tee /dev/stderr | grep -q "Authority=jinrai-dev"

      # ditto zip: 拡張属性・署名メタデータを保持しつつダブルクリック展開できる。
      # --keepParent が無いと展開時に JINRAI.app の中身がばらける
      - name: Archive
        run: ditto -c -k --keepParent .build/JINRAI.app "JINRAI-$VERSION.zip"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" "JINRAI-$VERSION.zip" \
            --title "$GITHUB_REF_NAME" --generate-notes

      - name: Update Homebrew tap
        env:
          TAP_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          SHA256=$(shasum -a 256 "JINRAI-$VERSION.zip" | cut -d' ' -f1)
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/tadashi-aikawa/homebrew-tap.git" "$RUNNER_TEMP/tap"
          cd "$RUNNER_TEMP/tap"
          sed -i '' \
            -e "s/^  version .*/  version \"$VERSION\"/" \
            -e "s/^  sha256 .*/  sha256 \"$SHA256\"/" \
            Casks/jinrai.rb
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "jinrai $VERSION"
          git push
